<!DOCTYPE html>
<html lang="en">
    <head>
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.10.4/gsap.min.js"></script>
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r108/three.js"></script>

        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Mohsin Rahman</title>

        <link
            href="https://fonts.googleapis.com/css2?family=Cutive+Mono&display=swap"
            rel="stylesheet">

        <link rel="stylesheet" href="styles/style.css" />
    </head>
    <body>

        <div class="loading-container">
            <span id="loadingText"></span><span class="cursor">|</span>
        </div>

        <script>
    const loadingTextEl = document.getElementById("loadingText");
    const fullText = "Loading...";
    let phase = "blinkStart";
    let cursorBlinkCount = 0;
    let charIndex = 0;

    function loopTyping() {
      if (phase === "blinkStart") {
        if (cursorBlinkCount < 5) {
          cursorBlinkCount++;
          setTimeout(loopTyping, 400);
        } else {
          phase = "typing";
          setTimeout(loopTyping, 100);
        }
      } else if (phase === "typing") {
        if (charIndex < fullText.length) {
          loadingTextEl.textContent += fullText[charIndex++];
          setTimeout(loopTyping, 150);
        } else {
          phase = "blinkEnd";
          cursorBlinkCount = 0;
          setTimeout(loopTyping, 500);
        }
      } else if (phase === "blinkEnd") {
        if (cursorBlinkCount < 5) {
          cursorBlinkCount++;
          setTimeout(loopTyping, 400);
        } else {
          phase = "deleting";
          setTimeout(loopTyping, 100);
        }
      } else if (phase === "deleting") {
        if (charIndex > 0) {
          charIndex--;
          loadingTextEl.textContent = fullText.substring(0, charIndex);
          setTimeout(loopTyping, 100);
        } else {
          phase = "blinkStart";
          cursorBlinkCount = 0;
          setTimeout(loopTyping, 400);
        }
      }
    }

    loopTyping();
  </script>

        <script>
    // Particle sphere logic
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 1000;

    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const distance = Math.min(200, window.innerWidth / 4);
    const geometry = new THREE.Geometry();
    for (let i = 0; i < 1600; i++) {
      const vertex = new THREE.Vector3();
      const theta = THREE.Math.randFloatSpread(360);
      const phi = THREE.Math.randFloatSpread(360);
      vertex.x = distance * Math.sin(theta) * Math.cos(phi);
      vertex.y = distance * Math.sin(theta) * Math.sin(phi);
      vertex.z = distance * Math.cos(theta);
      geometry.vertices.push(vertex);
    }

    const material = new THREE.PointsMaterial({ color: 0xffff00, size: 2 });
    const particles = new THREE.Points(geometry, material);

    const renderingParent = new THREE.Group();
    renderingParent.add(particles);

    const resizeContainer = new THREE.Group();
    resizeContainer.add(renderingParent);
    scene.add(resizeContainer);

    let autoRotateSpeed = 0.001;
    let isMouseOver = false;
    let lastMouseX = null;
    let lastMouseY = null;

    function animate() {
      requestAnimationFrame(animate);
      if (!isMouseOver) {
        renderingParent.rotation.y += autoRotateSpeed;
      }
      renderer.render(scene, camera);
    }
    animate();

    const animProps = { scale: 1 };
    gsap.to(animProps, {
      duration: 10,
      scale: 1.3,
      repeat: -1,
      yoyo: true,
      ease: 'sine',
      onUpdate: () => {
        renderingParent.scale.set(animProps.scale, animProps.scale, animProps.scale);
      }
    });

    window.addEventListener('mousemove', (event) => {
      const bounds = renderer.domElement.getBoundingClientRect();
      const inside =
        event.clientX >= bounds.left &&
        event.clientX <= bounds.right &&
        event.clientY >= bounds.top &&
        event.clientY <= bounds.bottom;

      if (!inside) {
        isMouseOver = false;
        lastMouseX = null;
        lastMouseY = null;
        return;
      }

      if (lastMouseX === null || lastMouseY === null) {
        lastMouseX = event.clientX;
        lastMouseY = event.clientY;
        return;
      }

      isMouseOver = true;

      const deltaX = event.clientX - lastMouseX;
      const deltaY = event.clientY - lastMouseY;

      renderingParent.rotation.y += deltaX * 0.01;
      renderingParent.rotation.x += deltaY * 0.01;

      lastMouseX = event.clientX;
      lastMouseY = event.clientY;
    });

    window.addEventListener('wheel', (e) => {
      e.preventDefault();
    }, { passive: false });
  </script>

    </body>
</html>
